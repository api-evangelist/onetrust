description: OneTrust does not publicly publish per-API rate limits. Server-Side CMP and Platform APIs
  respond with HTTP 429 when throttled.
notes: Tenant-specific limits; consult OneTrust support for exact thresholds.
sources:
- https://developer.onetrust.com/
responseCodes:
  throttled: 429
limits:
- name: Default OneTrust Platform
  scope: tenant
  metric: requests
  limit: not publicly documented
  notes: HTTP 429 returned when throttled.
policies:
- name: Backoff Strategy
  description: Clients should implement exponential backoff with jitter and honor any Retry-After header.
