aid: onetrust
url: https://raw.githubusercontent.com/api-evangelist/onetrust/refs/heads/main/apis.yml
name: OneTrust
kind: company
description: OneTrust is an enterprise privacy, security, ethics, and ESG platform. Its developer portal
  exposes APIs across Privacy Management, Third-Party Risk (Vendorpedia), Cookie Consent (Server-Side
  CMP), Certification Automation, GRC, AI Guard, and a broad SDK suite for mobile, OTT/CTV, and web.
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
- Privacy
- GRC
- Compliance
- Consent
- TPRM
created: '2026-05-08'
modified: '2026-05-08'
