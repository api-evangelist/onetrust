apis:
- aid: onetrust:platform-api
  name: OneTrust Platform API
  description: Cross-product REST API reference for the OneTrust platform covering privacy, GRC, ethics,
    third-party risk, and consent.
  humanURL: https://developer.onetrust.com/onetrust/reference
  tags:
  - Privacy
  - GRC
  - REST
  properties:
