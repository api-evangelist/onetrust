    url: https://developer.onetrust.com/onetrust/reference
  - type: QuickStart
    url: https://developer.onetrust.com/onetrust/reference/quick-start-guide
- aid: onetrust:server-side-cmp
  name: Server-Side CMP API
  description: Server-Side Consent Management Platform API for persisting consent, retrieving banner/preference
    center UI, and logging consent. Supports IAB TCF 2.3 and GPP.
  humanURL: https://developer.onetrust.com/onetrust/docs
  tags:
  - Consent
  - CMP
  - Privacy
  - TCF
  - GPP
  properties:
  - type: Documentation
    url: https://developer.onetrust.com/onetrust/docs
- aid: onetrust:ai-guard
  name: OneTrust AI Guard API
  description: REST API for AI risk classifications and metrics. Includes POST /classifications/v1, POST
    /metric, and GET /health.
  humanURL: https://developer.onetrust.com/onetrust/docs
  tags:
  - AI
  - Risk
  - Classification
  properties:
  - type: Documentation
    url: https://developer.onetrust.com/onetrust/docs
- aid: onetrust:vendorpedia
  name: OneTrust Third-Party Risk (Vendorpedia) API
  description: Vendor risk and assessment APIs for the OneTrust Third-Party Risk Management module (formerly
    Vendorpedia).
  humanURL: https://developer.onetrust.com/onetrust/reference
  tags:
  - TPRM
  - Vendor Risk
  - GRC
  properties:
  - type: Documentation
    url: https://developer.onetrust.com/onetrust/reference
- aid: onetrust:sdks
  name: OneTrust SDK Suite
  description: Mobile (iOS, Android), OTT/CTV (Roku, Fire TV, Apple TV, Android TV, Web OS, Tizen), and
    Website CMP SDKs.
  humanURL: https://developer.onetrust.com/onetrust/docs
  tags:
  - SDK
  - Mobile
  - OTT
  - Web
  properties:
  - type: Documentation
    url: https://developer.onetrust.com/onetrust/docs
